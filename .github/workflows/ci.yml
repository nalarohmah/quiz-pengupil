name: Automated Selenium Testing

# Trigger untuk menjalankan pipeline secara otomatis
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Menyiapkan database MySQL virtual di dalam GitHub Actions
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: quiz_pengupil
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mysqli, pdo_mysql

    - name: Import Database SQL
      run: |
        # Mengimpor file SQL dari folder db proyek
        mysql -h 127.0.0.1 -P 3306 -u root quiz_pengupil < db/quiz_pengupil.sql

    - name: Start PHP Built-in Server
      run: |
        # Menjalankan server lokal PHP di latar belakang pada port 8000
        php -S 127.0.0.1:8000 &
        
        # Jeda 2 detik untuk memastikan server menyala dengan baik
        sleep 2 

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pytest Selenium
      env:
        # Mengarahkan BASE_URL pengujian ke server lokal PHP port 8000
        BASE_URL: http://127.0.0.1:8000
      run: |
        pytest test_auth.py -v